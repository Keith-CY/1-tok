services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onetok}
      POSTGRES_USER: ${POSTGRES_USER:-onetok}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onetok} -d ${POSTGRES_DB:-onetok}"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js"]
    expose:
      - "4222"
      - "8222"

  remote-vps:
    build:
      context: ../..
      dockerfile: deploy/carrier/remote-vps.Dockerfile
    restart: unless-stopped
    environment:
      AUTHORIZED_KEY: ${CARRIER_E2E_REMOTE_AUTHORIZED_KEY:?CARRIER_E2E_REMOTE_AUTHORIZED_KEY must be set}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CODEX_TOKEN: ${OPENAI_CODEX_TOKEN:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      SSH_PORT: "22"
    expose:
      - "22"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/22'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  carrier-daemon:
    build:
      context: ../..
      dockerfile: deploy/carrier/Dockerfile.git
      args:
        CARRIER_REPO_URL: ${CARRIER_REPO_URL:-https://github.com/Keith-CY/carrier.git}
        CARRIER_REF: ${CARRIER_REF:-706b071b5c04be95a3cfbf3dea13768b3d43f214}
    restart: unless-stopped
    environment:
      CARRIER_SERVER_API_TOKEN: ${CARRIER_SERVER_API_TOKEN:?CARRIER_SERVER_API_TOKEN must be set}
      CARRIER_SERVER_PORT: "8788"
      CARRIER_SERVER_HOST: "0.0.0.0"
      CARRIER_DEV_MODE: "1"
    command: ["carrier", "daemon"]
    expose:
      - "8788"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --header='Authorization: Bearer ${CARRIER_SERVER_API_TOKEN}' -O- http://127.0.0.1:8788/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  carrier-gateway:
    build:
      context: ../..
      dockerfile: deploy/carrier/Dockerfile.git
      args:
        CARRIER_REPO_URL: ${CARRIER_REPO_URL:-https://github.com/Keith-CY/carrier.git}
        CARRIER_REF: ${CARRIER_REF:-706b071b5c04be95a3cfbf3dea13768b3d43f214}
    restart: unless-stopped
    environment:
      CARRIER_GATEWAY_API_TOKEN: ${CARRIER_GATEWAY_API_TOKEN:?CARRIER_GATEWAY_API_TOKEN must be set}
      CARRIER_SERVER_API_TOKEN: ${CARRIER_SERVER_API_TOKEN:?CARRIER_SERVER_API_TOKEN must be set}
      CARRIER_GATEWAY_PORT: "8787"
      CARRIER_GATEWAY_HOST: "0.0.0.0"
      CARRIER_DAEMON_BASE_URL: http://carrier-daemon:8788
      SESSION_DATA_DIR: /tmp/carrier
      CARRIER_REMOTE_PRIVATE_KEY_PATH: /keys/id_ed25519
      CARRIER_REMOTE_PRIVATE_KEY_BASE64: ${CARRIER_REMOTE_PRIVATE_KEY_BASE64:?CARRIER_REMOTE_PRIVATE_KEY_BASE64 must be set}
    command: ["carrier", "gateway"]
    expose:
      - "8787"
    depends_on:
      carrier-daemon:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8787/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - carrier-session-data:/tmp/carrier

  fnn:
    build:
      context: ../..
      dockerfile: deploy/fnn/Dockerfile
      args:
        FNN_VERSION: ${FNN_VERSION:-v0.6.1}
        FNN_ASSET: ${FNN_ASSET:-fnn_v0.6.1-x86_64-linux-portable.tar.gz}
        FNN_ASSET_SHA256: ${FNN_ASSET_SHA256:-8f9a69361f662438fa1fc29ddc668192810b13021536ebd1101c84dc0cfa330f}
    restart: unless-stopped
    environment:
      FIBER_SECRET_KEY_PASSWORD: ${FIBER_SECRET_KEY_PASSWORD:?FIBER_SECRET_KEY_PASSWORD must be set}
      FNN_CKB_RPC_URL: ${FNN_CKB_RPC_URL:-https://testnet.ckbapp.dev/}
    expose:
      - "8227"
      - "8228"
    healthcheck:
      test: ["CMD-SHELL", "FNN_HOST_IP=$$(hostname -i | awk '{print $$1}'); curl -sS --max-time 3 \"http://$${FNN_HOST_IP}:8227\" >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - fnn-data:/data

  fnn2:
    build:
      context: ../..
      dockerfile: deploy/fnn/Dockerfile
      args:
        FNN_VERSION: ${FNN_VERSION:-v0.6.1}
        FNN_ASSET: ${FNN_ASSET:-fnn_v0.6.1-x86_64-linux-portable.tar.gz}
        FNN_ASSET_SHA256: ${FNN_ASSET_SHA256:-8f9a69361f662438fa1fc29ddc668192810b13021536ebd1101c84dc0cfa330f}
    restart: unless-stopped
    environment:
      FIBER_SECRET_KEY_PASSWORD: ${FIBER_SECRET_KEY_PASSWORD:?FIBER_SECRET_KEY_PASSWORD must be set}
      FNN_CKB_RPC_URL: ${FNN2_CKB_RPC_URL:-https://testnet.ckbapp.dev/}
    expose:
      - "8227"
      - "8228"
    healthcheck:
      test: ["CMD-SHELL", "FNN_HOST_IP=$$(hostname -i | awk '{print $$1}'); curl -sS --max-time 3 \"http://$${FNN_HOST_IP}:8227\" >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - fnn2-data:/data

  provider-fnn:
    build:
      context: ../..
      dockerfile: deploy/fnn/Dockerfile
      args:
        FNN_VERSION: ${FNN_VERSION:-v0.6.1}
        FNN_ASSET: ${FNN_ASSET:-fnn_v0.6.1-x86_64-linux-portable.tar.gz}
        FNN_ASSET_SHA256: ${FNN_ASSET_SHA256:-8f9a69361f662438fa1fc29ddc668192810b13021536ebd1101c84dc0cfa330f}
    restart: unless-stopped
    environment:
      FIBER_SECRET_KEY_PASSWORD: ${FIBER_SECRET_KEY_PASSWORD:?FIBER_SECRET_KEY_PASSWORD must be set}
      FNN_CKB_RPC_URL: ${PROVIDER_FNN_CKB_RPC_URL:-https://testnet.ckbapp.dev/}
    expose:
      - "8227"
      - "8228"
    healthcheck:
      test: ["CMD-SHELL", "FNN_HOST_IP=$$(hostname -i | awk '{print $$1}'); curl -sS --max-time 3 \"http://$${FNN_HOST_IP}:8227\" >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - provider-fnn-data:/data

  fiber-adapter:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: fiber-adapter
        SERVICE_PORT: 8091
    restart: unless-stopped
    environment:
      FIBER_ADAPTER_ADDR: ":8091"
      FNN_INVOICE_RPC_URL: http://fnn:8227
      FNN_PAYER_RPC_URL: http://fnn2:8227
      FIBER_USDI_UDT_NAME: ${FIBER_USDI_UDT_NAME:-USDI}
      FIBER_USDI_UDT_TYPE_SCRIPT_JSON: ${FIBER_USDI_UDT_TYPE_SCRIPT_JSON:?FIBER_USDI_UDT_TYPE_SCRIPT_JSON must be set}
    expose:
      - "8091"
    depends_on:
      fnn:
        condition: service_healthy
      fnn2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8091/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  bootstrap:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: bootstrap
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onetok}?sslmode=disable
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    depends_on:
      postgres:
        condition: service_healthy

  iam:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: iam
        SERVICE_PORT: 8081
    restart: unless-stopped
    environment:
      IAM_ADDR: ":8081"
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onetok}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_ENFORCE: ${RATE_LIMIT_ENFORCE:-true}
      RATE_LIMIT_TRUST_PROXY: ${RATE_LIMIT_TRUST_PROXY:-true}
      RATE_LIMIT_TRUSTED_HOPS: ${RATE_LIMIT_TRUSTED_HOPS:-1}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
    expose:
      - "8081"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: api-gateway
        SERVICE_PORT: 8080
    restart: unless-stopped
    environment:
      API_GATEWAY_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onetok}?sslmode=disable
      IAM_UPSTREAM: http://iam:8081
      NATS_URL: nats://nats:4222
      API_GATEWAY_EXECUTION_TOKEN: ${ONE_TOK_EXECUTION_GATEWAY_TOKEN:?ONE_TOK_EXECUTION_GATEWAY_TOKEN must be set}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_ENFORCE: ${RATE_LIMIT_ENFORCE:-true}
      RATE_LIMIT_TRUST_PROXY: ${RATE_LIMIT_TRUST_PROXY:-true}
      RATE_LIMIT_TRUSTED_HOPS: ${RATE_LIMIT_TRUSTED_HOPS:-1}
      CORS_ALLOWED_ORIGIN: ${PUBLIC_WEB_URL:?PUBLIC_WEB_URL must be set}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      ONE_TOK_REQUIRE_EXTERNALS: "true"
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
      PROVIDER_SETTLEMENT_FNN_TREASURY_RPC_URL: http://fnn2:8227
      PROVIDER_SETTLEMENT_FNN_TREASURY_P2P_HOST: fnn2
      PROVIDER_SETTLEMENT_FNN_TREASURY_P2P_PORT: "8228"
      PROVIDER_SETTLEMENT_FNN_MIN_FUNDING_UNITS: ${PROVIDER_SETTLEMENT_FNN_MIN_FUNDING_UNITS:-50}
      PROVIDER_SETTLEMENT_FNN_POLL_INTERVAL_MILLISECONDS: ${PROVIDER_SETTLEMENT_FNN_POLL_INTERVAL_MILLISECONDS:-2000}
      PROVIDER_SETTLEMENT_FNN_WAIT_TIMEOUT_SECONDS: ${PROVIDER_SETTLEMENT_FNN_WAIT_TIMEOUT_SECONDS:-90}
      PROVIDER_SETTLEMENT_FNN_OPEN_CHANNEL_RETRIES: ${PROVIDER_SETTLEMENT_FNN_OPEN_CHANNEL_RETRIES:-10}
      PROVIDER_SETTLEMENT_FNN_ACCEPT_CHANNEL_RETRIES: ${PROVIDER_SETTLEMENT_FNN_ACCEPT_CHANNEL_RETRIES:-10}
      PROVIDER_SETTLEMENT_FNN_ACCEPT_RETRY_INTERVAL_ATTEMPTS: ${PROVIDER_SETTLEMENT_FNN_ACCEPT_RETRY_INTERVAL_ATTEMPTS:-6}
      SERVER_WRITE_TIMEOUT_SECONDS: ${SERVER_WRITE_TIMEOUT_SECONDS:-360}
      CARRIER_CALLBACK_BASE_URL: http://api-gateway:8080
      DEMO_API_BASE_URL: http://api-gateway:8080
      DEMO_IAM_BASE_URL: http://iam:8081
      DEMO_SETTLEMENT_BASE_URL: http://settlement:8083
      DEMO_EXECUTION_BASE_URL: http://execution:8085
      DEMO_CARRIER_BASE_URL: http://carrier-gateway:8787
      DEMO_FIBER_ADAPTER_BASE_URL: http://fiber-adapter:8091
      DEMO_SETTLEMENT_SERVICE_TOKEN: ${ONE_TOK_SETTLEMENT_SERVICE_TOKEN:?ONE_TOK_SETTLEMENT_SERVICE_TOKEN must be set}
      DEMO_RESOURCE_PREFIX: ${DEMO_RESOURCE_PREFIX:-demo-live}
      DEMO_MIN_BUYER_BALANCE_CENTS: ${DEMO_MIN_BUYER_BALANCE_CENTS:-5000}
      DEMO_MIN_PROVIDER_LIQUIDITY_CENTS: ${DEMO_MIN_PROVIDER_LIQUIDITY_CENTS:-88000}
      DEMO_BUYER_TOPUP_AMOUNT: ${DEMO_BUYER_TOPUP_AMOUNT:-50.00}
      DEMO_BUYER_EMAIL: ${DEMO_BUYER_EMAIL:-demo-buyer@example.com}
      DEMO_BUYER_PASSWORD: ${DEMO_BUYER_PASSWORD:?DEMO_BUYER_PASSWORD must be set}
      DEMO_BUYER_NAME: ${DEMO_BUYER_NAME:-Demo Buyer}
      DEMO_BUYER_ORG_NAME: ${DEMO_BUYER_ORG_NAME:-Demo Buyer Org}
      DEMO_BUYER_ORG_KIND: buyer
      DEMO_BUYER_ORG_ID: ${DEMO_BUYER_ORG_ID:-}
      DEMO_PROVIDER_EMAIL: ${DEMO_PROVIDER_EMAIL:-demo-provider@example.com}
      DEMO_PROVIDER_PASSWORD: ${DEMO_PROVIDER_PASSWORD:?DEMO_PROVIDER_PASSWORD must be set}
      DEMO_PROVIDER_NAME: ${DEMO_PROVIDER_NAME:-Demo Provider}
      DEMO_PROVIDER_ORG_NAME: ${DEMO_PROVIDER_ORG_NAME:-Demo Provider Org}
      DEMO_PROVIDER_ORG_KIND: provider
      DEMO_PROVIDER_ORG_ID: ${DEMO_PROVIDER_ORG_ID:-}
      DEMO_OPS_EMAIL: ${DEMO_OPS_EMAIL:-demo-ops@example.com}
      DEMO_OPS_PASSWORD: ${DEMO_OPS_PASSWORD:?DEMO_OPS_PASSWORD must be set}
      DEMO_OPS_NAME: ${DEMO_OPS_NAME:-Demo Ops}
      DEMO_OPS_ORG_NAME: ${DEMO_OPS_ORG_NAME:-Demo Ops Org}
      DEMO_OPS_ORG_KIND: ops
      DEMO_OPS_ORG_ID: ${DEMO_OPS_ORG_ID:-}
      RELEASE_USDI_E2E_API_BASE_URL: http://api-gateway:8080
      RELEASE_USDI_E2E_IAM_BASE_URL: http://iam:8081
      RELEASE_USDI_E2E_SETTLEMENT_BASE_URL: http://settlement:8083
      RELEASE_USDI_E2E_SETTLEMENT_SERVICE_TOKEN: ${ONE_TOK_SETTLEMENT_SERVICE_TOKEN:?ONE_TOK_SETTLEMENT_SERVICE_TOKEN must be set}
      RELEASE_USDI_E2E_EXECUTION_BASE_URL: http://execution:8085
      RELEASE_USDI_E2E_EXECUTION_EVENT_TOKEN: ${ONE_TOK_EXECUTION_EVENT_TOKEN:?ONE_TOK_EXECUTION_EVENT_TOKEN must be set}
      RELEASE_USDI_E2E_GATEWAY_SERVICE_TOKEN: ${ONE_TOK_EXECUTION_GATEWAY_TOKEN:?ONE_TOK_EXECUTION_GATEWAY_TOKEN must be set}
      RELEASE_USDI_E2E_FIBER_ADAPTER_BASE_URL: http://fiber-adapter:8091
      RELEASE_USDI_E2E_FIBER_ADAPTER_APP_ID: ${FIBER_APP_ID:?FIBER_APP_ID must be set}
      RELEASE_USDI_E2E_FIBER_ADAPTER_HMAC_SECRET: ${FIBER_HMAC_SECRET:?FIBER_HMAC_SECRET must be set}
      RELEASE_USDI_E2E_CARRIER_BASE_URL: http://carrier-gateway:8787
      RELEASE_USDI_E2E_CARRIER_INTEGRATION_TOKEN: ${CARRIER_GATEWAY_API_TOKEN:?CARRIER_GATEWAY_API_TOKEN must be set}
      RELEASE_USDI_E2E_CARRIER_GATEWAY_TOKEN: ${CARRIER_GATEWAY_API_TOKEN:?CARRIER_GATEWAY_API_TOKEN must be set}
      RELEASE_USDI_E2E_CARRIER_HOST_ID: ${RELEASE_USDI_E2E_CARRIER_HOST_ID:-host_1}
      RELEASE_USDI_E2E_CARRIER_AGENT_ID: ${RELEASE_USDI_E2E_CARRIER_AGENT_ID:-main}
      RELEASE_USDI_E2E_CARRIER_BACKEND: ${RELEASE_USDI_E2E_CARRIER_BACKEND:-codex}
      RELEASE_USDI_E2E_CARRIER_WORKSPACE_ROOT: ${RELEASE_USDI_E2E_CARRIER_WORKSPACE_ROOT:-/workspace}
      RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_NAME: ${RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_NAME:-usdi-remote}
      RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_HOST: ${RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_HOST:-remote-vps}
      RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_PORT: ${RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_PORT:-22}
      RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_USER: ${RELEASE_USDI_E2E_CARRIER_REMOTE_HOST_USER:-carrier}
      RELEASE_USDI_E2E_CARRIER_REMOTE_KEY_PATH: ${RELEASE_USDI_E2E_CARRIER_REMOTE_KEY_PATH:-/keys/id_ed25519}
      RELEASE_USDI_E2E_CARRIER_CALLBACK_SECRET: ${RELEASE_USDI_E2E_CARRIER_CALLBACK_SECRET:-usdi-e2e-callback-secret}
      RELEASE_USDI_E2E_CARRIER_CALLBACK_KEY_ID: ${RELEASE_USDI_E2E_CARRIER_CALLBACK_KEY_ID:-usdi-e2e-key}
      RELEASE_USDI_E2E_PROVIDER_SETTLEMENT_RPC_URL: http://provider-fnn:8227
      RELEASE_USDI_E2E_PROVIDER_SETTLEMENT_P2P_HOST: provider-fnn
      RELEASE_USDI_E2E_PROVIDER_SETTLEMENT_P2P_PORT: "8228"
      RELEASE_USDI_E2E_PROVIDER_SETTLEMENT_UDT_TYPE_SCRIPT_JSON: ${FIBER_USDI_UDT_TYPE_SCRIPT_JSON:?FIBER_USDI_UDT_TYPE_SCRIPT_JSON must be set}
    expose:
      - "8080"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      carrier-gateway:
        condition: service_healthy
      fiber-adapter:
        condition: service_healthy

  marketplace:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: marketplace
        SERVICE_PORT: 8082
    restart: unless-stopped
    environment:
      MARKETPLACE_ADDR: ":8082"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    expose:
      - "8082"
    depends_on:
      api-gateway:
        condition: service_started

  settlement:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: settlement
        SERVICE_PORT: 8083
    restart: unless-stopped
    environment:
      SETTLEMENT_ADDR: ":8083"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onetok}?sslmode=disable
      IAM_UPSTREAM: http://iam:8081
      FIBER_RPC_URL: http://fiber-adapter:8091
      FIBER_APP_ID: ${FIBER_APP_ID:?FIBER_APP_ID must be set}
      FIBER_HMAC_SECRET: ${FIBER_HMAC_SECRET:?FIBER_HMAC_SECRET must be set}
      SETTLEMENT_SERVICE_TOKEN: ${ONE_TOK_SETTLEMENT_SERVICE_TOKEN:?ONE_TOK_SETTLEMENT_SERVICE_TOKEN must be set}
      MARKETPLACE_SETTLEMENT_ASSET: USDI
      MARKETPLACE_TREASURY_USER_ID: platform_treasury
      CORS_ALLOWED_ORIGIN: ${PUBLIC_WEB_URL:?PUBLIC_WEB_URL must be set}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      ONE_TOK_REQUIRE_EXTERNALS: "true"
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
    expose:
      - "8083"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api-gateway:
        condition: service_started
      fiber-adapter:
        condition: service_healthy
      postgres:
        condition: service_healthy

  settlement-reconciler:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: settlement-reconciler
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-onetok}?sslmode=disable
      FIBER_RPC_URL: http://fiber-adapter:8091
      FIBER_APP_ID: ${FIBER_APP_ID:?FIBER_APP_ID must be set}
      FIBER_HMAC_SECRET: ${FIBER_HMAC_SECRET:?FIBER_HMAC_SECRET must be set}
      MARKETPLACE_SETTLEMENT_ASSET: USDI
      MARKETPLACE_TREASURY_USER_ID: platform_treasury
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
      SETTLEMENT_RECONCILER_INTERVAL: ${SETTLEMENT_RECONCILER_INTERVAL:-5s}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      fiber-adapter:
        condition: service_healthy
      postgres:
        condition: service_healthy

  risk:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: risk
        SERVICE_PORT: 8084
    restart: unless-stopped
    environment:
      RISK_ADDR: ":8084"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    expose:
      - "8084"
    depends_on:
      api-gateway:
        condition: service_started

  execution:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: execution
        SERVICE_PORT: 8085
    restart: unless-stopped
    environment:
      EXECUTION_ADDR: ":8085"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      EXECUTION_EVENT_TOKEN: ${ONE_TOK_EXECUTION_EVENT_TOKEN:?ONE_TOK_EXECUTION_EVENT_TOKEN must be set}
      EXECUTION_GATEWAY_TOKEN: ${ONE_TOK_EXECUTION_GATEWAY_TOKEN:?ONE_TOK_EXECUTION_GATEWAY_TOKEN must be set}
      CARRIER_GATEWAY_URL: http://carrier-gateway:8787
      CARRIER_GATEWAY_API_TOKEN: ${CARRIER_GATEWAY_API_TOKEN:?CARRIER_GATEWAY_API_TOKEN must be set}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      ONE_TOK_REQUIRE_EXTERNALS: "true"
    expose:
      - "8085"
    depends_on:
      api-gateway:
        condition: service_started
      carrier-gateway:
        condition: service_healthy

  notification:
    build:
      context: ../..
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: notification
        SERVICE_PORT: 8086
    restart: unless-stopped
    environment:
      NOTIFICATION_ADDR: ":8086"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    expose:
      - "8086"
    depends_on:
      api-gateway:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        BUN_VERSION: ${BUN_VERSION:-1.2.22}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:?PUBLIC_API_BASE_URL must be set}
      NEXT_PUBLIC_SETTLEMENT_BASE_URL: ${PUBLIC_SETTLEMENT_BASE_URL:?PUBLIC_SETTLEMENT_BASE_URL must be set}
      IAM_BASE_URL: http://iam:8081
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-testnet}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    expose:
      - "3000"
    depends_on:
      api-gateway:
        condition: service_started
      iam:
        condition: service_started
      settlement:
        condition: service_started

volumes:
  carrier-session-data:
  fnn-data:
  fnn2-data:
  postgres-data:
  provider-fnn-data:
