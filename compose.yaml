services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onetok
      POSTGRES_USER: onetok
      POSTGRES_PASSWORD: onetok
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onetok -d onetok"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "${NATS_PUBLISHED_PORT:-4222}:4222"
      - "${NATS_MONITOR_PUBLISHED_PORT:-8222}:8222"

  mock-fiber:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: mock-fiber
    environment:
      MOCK_FIBER_ADDR: ":8090"
    ports:
      - "${MOCK_FIBER_PUBLISHED_PORT:-8090}:8090"

  mock-carrier:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: mock-carrier
    environment:
      MOCK_CARRIER_ADDR: ":8787"
      MOCK_CARRIER_API_TOKEN: ${CARRIER_GATEWAY_API_TOKEN:-test-gateway-token}
    ports:
      - "${MOCK_CARRIER_PUBLISHED_PORT:-8787}:8787"

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: bootstrap
    environment:
      DATABASE_URL: postgres://onetok:onetok@postgres:5432/onetok?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: api-gateway
    environment:
      API_GATEWAY_ADDR: ":8080"
      DATABASE_URL: postgres://onetok:onetok@postgres:5432/onetok?sslmode=disable
      IAM_UPSTREAM: http://iam:8081
      NATS_URL: nats://nats:4222
      API_GATEWAY_EXECUTION_TOKEN: ${ONE_TOK_EXECUTION_GATEWAY_TOKEN:-local-execution-gateway-token}
      ONE_TOK_REQUIRE_EXTERNALS: "true"
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
    ports:
      - "${API_GATEWAY_PUBLISHED_PORT:-8080}:8080"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  iam:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: iam
    environment:
      IAM_ADDR: ":8081"
      DATABASE_URL: postgres://onetok:onetok@postgres:5432/onetok?sslmode=disable
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
    ports:
      - "${IAM_PUBLISHED_PORT:-8081}:8081"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  marketplace:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: marketplace
    environment:
      MARKETPLACE_ADDR: ":8082"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
    ports:
      - "${MARKETPLACE_PUBLISHED_PORT:-8082}:8082"
    depends_on:
      - api-gateway

  settlement:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: settlement
    environment:
      SETTLEMENT_ADDR: ":8083"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      DATABASE_URL: postgres://onetok:onetok@postgres:5432/onetok?sslmode=disable
      IAM_UPSTREAM: http://iam:8081
      FIBER_RPC_URL: ${FIBER_RPC_URL:-http://mock-fiber:8090}
      FIBER_APP_ID: ${FIBER_APP_ID:-app_1}
      FIBER_HMAC_SECRET: ${FIBER_HMAC_SECRET:-replace-me}
      SETTLEMENT_SERVICE_TOKEN: ${ONE_TOK_SETTLEMENT_SERVICE_TOKEN:-local-settlement-service-token}
      ONE_TOK_REQUIRE_EXTERNALS: "true"
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
    ports:
      - "${SETTLEMENT_PUBLISHED_PORT:-8083}:8083"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api-gateway:
        condition: service_started
      mock-fiber:
        condition: service_started
      postgres:
        condition: service_healthy

  settlement-reconciler:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: settlement-reconciler
    environment:
      DATABASE_URL: postgres://onetok:onetok@postgres:5432/onetok?sslmode=disable
      FIBER_RPC_URL: ${FIBER_RPC_URL:-http://mock-fiber:8090}
      FIBER_APP_ID: ${FIBER_APP_ID:-app_1}
      FIBER_HMAC_SECRET: ${FIBER_HMAC_SECRET:-replace-me}
      ONE_TOK_REQUIRE_PERSISTENCE: "true"
      ONE_TOK_REQUIRE_BOOTSTRAP: "true"
      SETTLEMENT_RECONCILER_INTERVAL: ${SETTLEMENT_RECONCILER_INTERVAL:-30s}
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      mock-fiber:
        condition: service_started
      postgres:
        condition: service_healthy

  risk:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: risk
    environment:
      RISK_ADDR: ":8084"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
    ports:
      - "${RISK_PUBLISHED_PORT:-8084}:8084"
    depends_on:
      - api-gateway

  execution:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: execution
    environment:
      EXECUTION_ADDR: ":8085"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      EXECUTION_EVENT_TOKEN: ${ONE_TOK_EXECUTION_EVENT_TOKEN:-local-execution-event-token}
      EXECUTION_GATEWAY_TOKEN: ${ONE_TOK_EXECUTION_GATEWAY_TOKEN:-local-execution-gateway-token}
      CARRIER_GATEWAY_URL: ${CARRIER_GATEWAY_URL:-http://mock-carrier:8787}
      CARRIER_GATEWAY_API_TOKEN: ${CARRIER_GATEWAY_API_TOKEN:-test-gateway-token}
      ONE_TOK_REQUIRE_EXTERNALS: "true"
    ports:
      - "${EXECUTION_PUBLISHED_PORT:-8085}:8085"
    depends_on:
      - api-gateway
      - mock-carrier

  notification:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: notification
    environment:
      NOTIFICATION_ADDR: ":8086"
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
    ports:
      - "${NOTIFICATION_PUBLISHED_PORT:-8086}:8086"
    depends_on:
      - api-gateway

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api-gateway:8080
      NEXT_PUBLIC_SETTLEMENT_BASE_URL: http://settlement:8083
      IAM_BASE_URL: http://iam:8081
      ONE_TOK_ALLOW_INSECURE_SESSION_COOKIE: "true"
    ports:
      - "${WEB_PUBLISHED_PORT:-3000}:3000"
    depends_on:
      - api-gateway
      - iam
      - settlement

volumes:
  postgres-data:
