name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit And Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onetok
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: onetok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U onetok"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ONE_TOK_TEST_DATABASE_URL: "postgres://onetok:testpass@localhost:5432/onetok_test?sslmode=disable"
      ONE_TOK_TEST_NATS_URL: "nats://localhost:4222"
      ONE_TOK_TEST_REDIS_URL: "redis://localhost:6379"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats-js --network host nats:2.10-alpine -js
          sleep 2

      - name: Start Redis
        run: |
          docker run -d --name redis-test --network host redis:7-alpine
          sleep 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Unit Coverage
        id: unit_coverage
        run: bun run test:coverage

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .artifacts/coverage
          if-no-files-found: error

      - name: Publish Coverage Summary
        if: always()
        run: |
          if [[ -f .artifacts/coverage/summary.md ]]; then
            cat .artifacts/coverage/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Coverage summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi


  portal_ux:
    name: Portal UX Governance
    outputs:
      skipped: ${{ steps.governance.outputs.skipped }}
      ranUiCheck: ${{ steps.governance.outputs.ranUiCheck }}
      ranConfigValidation: ${{ steps.governance.outputs.ranConfigValidation }}
      runMode: ${{ steps.governance.outputs.runMode }}
      details: ${{ steps.governance.outputs.details }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect UX governance relevant changes
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ux-pages:
              - 'apps/web/app/buyer/**'
              - 'apps/web/app/provider/**'
              - 'apps/web/app/ops/**'
            ux-audit-config:
              - 'alpha-portal-ux-audit.config.json'
              - 'alpha-portal-ux-audit.config.example.json'
              - 'alpha-portal-ux-audit.config.schema.json'
              - 'scripts/alpha-portal-ux-audit.mjs'
              - '.github/workflows/ci.yml'
              - 'apps/web/components/portal-shell.tsx'
              - 'apps/web/components/ui.tsx'
              - 'apps/web/app/globals.css'

      - name: Setup Bun
        if: steps.changed.outputs.ux-pages == 'true' || steps.changed.outputs.ux-audit-config == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install Dependencies
        if: steps.changed.outputs.ux-pages == 'true' || steps.changed.outputs.ux-audit-config == 'true'
        run: bun install --frozen-lockfile

      - name: Run Portal UX Governance Checks
        id: governance
        run: |
          if [[ "${{ steps.changed.outputs.ux-pages }}" != "true" && "${{ steps.changed.outputs.ux-audit-config }}" != "true" ]]; then
            echo "No UX governance related file changes detected; skipping portal UX checks."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "ranUiCheck=false" >> "$GITHUB_OUTPUT"
            echo "ranConfigValidation=false" >> "$GITHUB_OUTPUT"
            echo "runMode=none" >> "$GITHUB_OUTPUT"
            echo "details=No UX governance-related paths changed; nothing to run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"

          if [[ "${{ steps.changed.outputs.ux-pages }}" == "true" ]]; then
            echo "ranUiCheck=true" >> "$GITHUB_OUTPUT"
          else
            echo "ranUiCheck=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.changed.outputs.ux-audit-config }}" == "true" ]]; then
            echo "ranConfigValidation=true" >> "$GITHUB_OUTPUT"
          else
            echo "ranConfigValidation=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.changed.outputs.ux-pages }}" == "true" && "${{ steps.changed.outputs.ux-audit-config }}" == "true" ]]; then
            echo "runMode=full" >> "$GITHUB_OUTPUT"
            echo "details=Portal UX pages and governance config changed; both strict portal:check and config validation executed" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.changed.outputs.ux-pages }}" == "true" ]]; then
            echo "runMode=ui" >> "$GITHUB_OUTPUT"
            echo "details=Only portal UX pages changed; strict portal:check executed" >> "$GITHUB_OUTPUT"
          else
            echo "runMode=config" >> "$GITHUB_OUTPUT"
            echo "details=Only UX-audit governance config/script files changed; validate-config executed" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.changed.outputs.ux-pages }}" == "true" ]]; then
            bun run portal:check
          else
            echo "Portal UX page scope not changed; skipping strict portal:check for this run."
          fi

          if [[ "${{ steps.changed.outputs.ux-audit-config }}" == "true" ]]; then
            bun run alpha:ux-audit:validate-config
          else
            echo "No UX audit config/script changes; skipping config validation."
          fi

      - name: Upload Portal UX Audit Summary
        if: steps.governance.outputs.ranUiCheck == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alpha-portal-ux-audit-summary
          path: .artifacts/portal-ux/alpha-portal-ux-audit-summary.md
          if-no-files-found: error

      - name: Upload Portal UX Audit JSON
        if: steps.governance.outputs.ranUiCheck == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alpha-portal-ux-audit-json
          path: .artifacts/portal-ux/alpha-portal-ux-audit.json
          if-no-files-found: error

      - name: Publish Portal UX Summary
        if: steps.governance.outputs.ranUiCheck == 'true'
        run: |
          echo "## Alpha Portal UX Audit Summary" >> "$GITHUB_STEP_SUMMARY"
          cat .artifacts/portal-ux/alpha-portal-ux-audit-summary.md >> "$GITHUB_STEP_SUMMARY"

  integration:
    name: Integration Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Extract Bun version for Docker
        id: bun_ver
        run: echo "version=$(grep -o 'bun@[^"]*' package.json | cut -d'@' -f2)" >> "$GITHUB_OUTPUT"

      - name: Validate Compose
        run: docker compose -f compose.yaml -f compose.fnn.yaml -f compose.e2e.yaml config
        env:
          BUN_VERSION: ${{ steps.bun_ver.outputs.version }}

      - name: Run Integration Smoke
        env:
          BUN_VERSION: ${{ steps.bun_ver.outputs.version }}
        run: |
          for attempt in 1 2; do
            echo "=== Integration Smoke attempt ${attempt} ==="
            if bun run test:integration; then
              echo "Integration Smoke passed on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt 2 ]; then
              echo "Attempt ${attempt} failed (likely transient: FNN/CKB testnet or container timeout). Retrying in 30s..."
              docker compose -f compose.yaml -f compose.fnn.yaml -f compose.e2e.yaml down -v --remove-orphans 2>/dev/null || true
              sleep 30
            fi
          done
          echo "Integration Smoke failed after 2 attempts"
          exit 1

  e2e_screenshots:
    name: E2E Marketplace Screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare screenshot artifact dir
        run: mkdir -p .artifacts/e2e-screenshots

      - name: Capture marketplace screenshots
        env:
          E2E_SCREENSHOT_OUTPUT_DIR: ${{ github.workspace }}/.artifacts/e2e-screenshots
          SCREENSHOT_CAPTURE_MODE: full-pages
        run: ./scripts/release-compose-e2e-screenshots.sh

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-marketplace-screenshots
          path: .artifacts/e2e-screenshots
          if-no-files-found: error

      - name: Push screenshots to ref
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        id: screenshot_ref
        run: |
          REF_NAME="screenshots/pr-${{ github.event.pull_request.number }}"
          TMP_DIR="$(mktemp -d)"
          cp -R .artifacts/e2e-screenshots/. "$TMP_DIR/"
          rm -rf .artifacts

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan "$REF_NAME"
          git rm -rf . >/dev/null 2>&1 || true
          cp -R "$TMP_DIR"/. .
          git add -A
          git commit -m "Screenshots for ${{ github.sha }}" --allow-empty
          git push origin "$REF_NAME" --force

          echo "ref=$REF_NAME" >> "$GITHUB_OUTPUT"
          echo "tmp_dir=$TMP_DIR" >> "$GITHUB_OUTPUT"

      - name: Generate screenshot comment
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          SCREENSHOT_COMMENT_FORMAT: github-pr
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REF_NAME: ${{ steps.screenshot_ref.outputs.ref }}
          MANIFEST_PATH: ${{ steps.screenshot_ref.outputs.tmp_dir }}/manifest.json
          COMMENT_OUTPUT_PATH: e2e-screenshot-comment.md
        run: |
          node ./harness/e2e-screenshots/render-comment.mjs

      - name: Upsert screenshot PR comment
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const body = fs.readFileSync("e2e-screenshot-comment.md", "utf8");
            const marker = "<!-- 1-tok-e2e-screenshots -->";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.login === "github-actions[bot]" &&
              comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated screenshot comment ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info(`Created screenshot comment ${created.data.id}`);
            }

  report:
    name: Report
    runs-on: ubuntu-latest
    needs:
      - unit
      - integration
      - portal_ux
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .artifacts/coverage
        continue-on-error: true


      - name: Download Portal UX Audit Summary
        uses: actions/download-artifact@v4
        with:
          name: alpha-portal-ux-audit-summary
          path: .artifacts/portal-ux
        continue-on-error: true

      - name: Download Portal UX Audit JSON
        uses: actions/download-artifact@v4
        with:
          name: alpha-portal-ux-audit-json
          path: .artifacts/portal-ux
        continue-on-error: true

      - name: Build Report Body
        id: report_body
        env:
          UNIT_RESULT: ${{ needs.unit.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
          PORTAL_RESULT: ${{ needs.portal_ux.result }}
          PORTAL_GOV_SKIPPED: ${{ needs.portal_ux.outputs.skipped }}
          PORTAL_UI_CHECK_RUN: ${{ needs.portal_ux.outputs.ranUiCheck }}
          PORTAL_CONFIG_VALIDATION_RUN: ${{ needs.portal_ux.outputs.ranConfigValidation }}
          PORTAL_GOV_MODE: ${{ needs.portal_ux.outputs.runMode }}
          PORTAL_GOV_DETAILS: ${{ needs.portal_ux.outputs.details }}
          REPOSITORY: ${{ github.repository }}
          PORTAL_SUMMARY_PATH: .artifacts/portal-ux/alpha-portal-ux-audit-summary.md
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          marker = "<!-- 1-tok-ci-report -->"
          coverage_path = Path(".artifacts/coverage/summary.md")
          coverage = coverage_path.read_text(encoding="utf-8").strip() if coverage_path.exists() else "## Coverage\n\nCoverage summary artifact was not available."
          run_url = f"https://github.com/{os.environ['REPOSITORY']}/actions/runs/{os.environ['RUN_ID']}/attempts/{os.environ['RUN_ATTEMPT']}"
          portal_summary = ""
          portal_summary_path = Path(os.environ["PORTAL_SUMMARY_PATH"])
          if portal_summary_path.exists():
            portal_summary = portal_summary_path.read_text(encoding="utf-8").strip()
          else:
            portal_summary = "## Alpha Portal UX Audit Summary\n\n(Not available)"

          body = "\n".join([
              marker,
              "## CI Report",
              "",
              f"- Unit and coverage: `{os.environ['UNIT_RESULT']}`",
              f"- Integration smoke: `{os.environ['INTEGRATION_RESULT']}`",
              f"- Portal UX governance: `{os.environ['PORTAL_RESULT']}`",
              f"- Portal UX consistency check run: `{os.environ['PORTAL_UI_CHECK_RUN']}`",
              f"- Portal UX config validation run: `{os.environ['PORTAL_CONFIG_VALIDATION_RUN']}`",
              f"- Portal UX governance skipped: `{os.environ['PORTAL_GOV_SKIPPED']}`",
              f"- Portal UX governance mode: `{os.environ['PORTAL_GOV_MODE']}`",
              f"- Portal UX governance details: `{os.environ['PORTAL_GOV_DETAILS']}`",
              f"- Run: {run_url}",
              "",
              coverage,
              "",
              portal_summary,
          ]) + "\n"
          Path("ci-report.md").write_text(body, encoding="utf-8")
          PY

      - name: Publish Job Summary
        run: cat ci-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR Comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const body = fs.readFileSync("ci-report.md", "utf8");
            const marker = "<!-- 1-tok-ci-report -->";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.login === "github-actions[bot]" &&
              comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated CI report comment ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info(`Created CI report comment ${created.data.id}`);
            }
