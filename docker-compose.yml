# 1-tok Agent Runtime Marketplace — Development Compose
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onetok}
      POSTGRES_USER: ${POSTGRES_USER:-onetok}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onetok}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onetok"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: .
      dockerfile: cmd/api-gateway/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD:-onetok}@postgres:5432/onetok?sslmode=disable
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      IAM_UPSTREAM: http://iam:8081
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started

  iam:
    build:
      context: .
      dockerfile: cmd/iam/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD:-onetok}@postgres:5432/onetok?sslmode=disable
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  settlement:
    build:
      context: .
      dockerfile: cmd/settlement/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-onetok}:${POSTGRES_PASSWORD:-onetok}@postgres:5432/onetok?sslmode=disable
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
      NATS_URL: nats://nats:4222
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api-gateway:8080
      NEXT_PUBLIC_SETTLEMENT_BASE_URL: http://settlement:8082
      IAM_UPSTREAM: http://iam:8081
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
      - iam

volumes:
  pgdata:
