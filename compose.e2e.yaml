services:
  mock-sentry:
    build:
      context: .
      dockerfile: Dockerfile.go-service
      args:
        SERVICE: mock-sentry
    environment:
      MOCK_SENTRY_ADDR: ":8092"
    ports:
      - "${MOCK_SENTRY_PUBLISHED_PORT:-28092}:8092"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8092/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  bootstrap:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e

  fiber-adapter:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8091/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  mock-fiber:
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8090/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  mock-carrier:
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8787/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  iam:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8081/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api-gateway:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  marketplace:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8082/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  settlement:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8083/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  execution:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8085/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  web:
    environment:
      NEXT_PUBLIC_SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "HOST_IP=$$(hostname -i | awk '{print $$1}'); HOST_IP=$${HOST_IP} bun -e \"const res = await fetch('http://' + process.env.HOST_IP + ':3000/login'); if (!res.ok) process.exit(1);\"",
        ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  settlement-reconciler:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e

  risk:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e

  notification:
    environment:
      SENTRY_DSN: http://public@mock-sentry:8092/1
      SENTRY_ENVIRONMENT: compose-e2e
      SENTRY_RELEASE: compose-e2e

  e2e-runner:
    build:
      context: .
      dockerfile: deploy/e2e/Dockerfile
    environment:
      RELEASE_E2E_INCLUDE_FNN_SMOKE: ${RELEASE_E2E_INCLUDE_FNN_SMOKE:-false}
      RELEASE_FNN_ADAPTER_BASE_URL: http://fiber-adapter:8091
      RELEASE_FNN_ADAPTER_APP_ID: app_local
      RELEASE_FNN_ADAPTER_HMAC_SECRET: secret_local
      RELEASE_FNN_DUAL_INVOICE_RPC_URL: http://fnn:8227
      RELEASE_FNN_DUAL_PAYER_RPC_URL: http://fnn2:8227
      RELEASE_FNN_DUAL_INVOICE_P2P_HOST: fnn
      RELEASE_FNN_DUAL_PAYER_P2P_HOST: fnn2
      RELEASE_SMOKE_API_BASE_URL: http://api-gateway:8080
      RELEASE_SMOKE_IAM_BASE_URL: http://iam:8081
      RELEASE_SMOKE_SETTLEMENT_BASE_URL: http://settlement:8083
      RELEASE_SMOKE_SETTLEMENT_SERVICE_TOKEN: ${ONE_TOK_SETTLEMENT_SERVICE_TOKEN:-local-settlement-service-token}
      RELEASE_SMOKE_EXECUTION_BASE_URL: http://execution:8085
      RELEASE_SMOKE_EXECUTION_EVENT_TOKEN: ${ONE_TOK_EXECUTION_EVENT_TOKEN:-local-execution-event-token}
      RELEASE_SMOKE_INCLUDE_WITHDRAWAL: "true"
      RELEASE_SMOKE_INCLUDE_CARRIER_PROBE: "true"
      RELEASE_PORTAL_SMOKE_WEB_BASE_URL: http://web:3000
      RELEASE_PORTAL_SMOKE_API_BASE_URL: http://api-gateway:8080
      RELEASE_PORTAL_SMOKE_IAM_BASE_URL: http://iam:8081
      RELEASE_PORTAL_SMOKE_EXECUTION_BASE_URL: http://execution:8085
      RELEASE_PORTAL_SMOKE_EXECUTION_EVENT_TOKEN: ${ONE_TOK_EXECUTION_EVENT_TOKEN:-local-execution-event-token}
      RELEASE_ABUSE_IAM_BASE_URL: http://iam:8081
      RELEASE_ABUSE_SENTRY_BASE_URL: http://mock-sentry:8092
    depends_on:
      mock-fiber:
        condition: service_healthy
      mock-carrier:
        condition: service_healthy
      iam:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      marketplace:
        condition: service_healthy
      settlement:
        condition: service_healthy
      execution:
        condition: service_healthy
      web:
        condition: service_healthy
      mock-sentry:
        condition: service_healthy
      settlement-reconciler:
        condition: service_started
    command:
      - /bin/sh
      - -lc
      - >
        if [ "$${RELEASE_E2E_INCLUDE_FNN_SMOKE:-false}" = "true" ]; then
          /usr/local/bin/release-fnn-adapter-smoke &&
          /usr/local/bin/release-smoke &&
          /usr/local/bin/release-portal-smoke &&
          /usr/local/bin/release-abuse-smoke;
        else
          /usr/local/bin/release-smoke &&
          /usr/local/bin/release-portal-smoke &&
          /usr/local/bin/release-abuse-smoke;
        fi

  e2e-screenshot-runner:
    build:
      context: .
      dockerfile: deploy/e2e-screenshots/Dockerfile
    environment:
      SCREENSHOT_CAPTURE_MODE: ${SCREENSHOT_CAPTURE_MODE:-journey}
      SCREENSHOT_OUTPUT_DIR: /artifacts
      SCREENSHOT_WEB_BASE_URL: http://web:3000
      SCREENSHOT_API_BASE_URL: http://api-gateway:8080
      SCREENSHOT_IAM_BASE_URL: http://iam:8081
      SCREENSHOT_SETTLEMENT_BASE_URL: http://settlement:8083
      SCREENSHOT_SETTLEMENT_SERVICE_TOKEN: ${ONE_TOK_SETTLEMENT_SERVICE_TOKEN:-local-settlement-service-token}
      SCREENSHOT_EXECUTION_BASE_URL: http://execution:8085
      SCREENSHOT_EXECUTION_EVENT_TOKEN: ${ONE_TOK_EXECUTION_EVENT_TOKEN:-local-execution-event-token}
    volumes:
      - "${E2E_SCREENSHOT_HOST_OUTPUT_DIR:-./.artifacts/e2e-screenshots}:/artifacts"
    depends_on:
      mock-fiber:
        condition: service_healthy
      mock-carrier:
        condition: service_healthy
      iam:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      marketplace:
        condition: service_healthy
      settlement:
        condition: service_healthy
      execution:
        condition: service_healthy
      web:
        condition: service_healthy
      mock-sentry:
        condition: service_healthy
      settlement-reconciler:
        condition: service_started
